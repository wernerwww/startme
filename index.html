<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  :root{
    --bg:#0d1117;
    --card:#161b22;
    --card-head:#1c2230;
    --border:#21262d;
    --text:#c9d1d9;
    --text-dim:#8b949e;
    --accent:#3fb950;
    --accent-dim:#2ea043;
    --blue:#58a6ff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace;
    padding:48px 24px 80px;
  }
  .wrap{max-width:1280px;margin:0 auto;}

  header{margin-bottom:36px;}
  .eyebrow{
    color:var(--accent);
    font-size:13px;
    letter-spacing:.15em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{font-size:32px;margin:0 0 8px;color:#fff;font-weight:600;}
  .sub{color:var(--text-dim);font-size:14px;line-height:1.6;max-width:600px;}

  .board{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    align-items:start;
  }
  @media (max-width: 1000px){ .board{grid-template-columns:repeat(2, 1fr);} }
  @media (max-width: 620px){ .board{grid-template-columns:1fr;} }

  .column{
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--card);
    overflow:hidden;
  }
  .col-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    background:var(--card-head);
    border-bottom:1px solid var(--border);
    cursor:pointer;
    user-select:none;
  }
  .col-head h2{
    font-size:14px;
    margin:0;
    color:#fff;
    font-weight:600;
    letter-spacing:.02em;
  }
  .col-head .count{
    font-size:11px;
    color:var(--text-dim);
    background:#0d1117;
    padding:2px 8px;
    border-radius:999px;
    border:1px solid var(--border);
  }
  .chevron{
    color:var(--text-dim);
    transition:transform .18s ease;
    font-size:12px;
  }
  .column.collapsed .chevron{transform:rotate(-90deg);}
  .column.collapsed .col-body{display:none;}

  .col-body{padding:10px;}

  .tile{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border-radius:7px;
    text-decoration:none;
    color:var(--text);
    font-size:13px;
    border:1px solid transparent;
    transition:background .12s ease, border-color .12s ease, transform .08s ease;
  }
  .tile:hover{background:#1c2230;border-color:var(--border);transform:translateX(2px);}
  .tile img{
    width:18px;height:18px;border-radius:4px;flex-shrink:0;
    background:#0d1117;
  }
  .tile span{
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tile .arrow{color:var(--text-dim);font-size:12px;opacity:0;transition:opacity .12s ease;}
  .tile:hover .arrow{opacity:1;color:var(--blue);}

  .add-link-btn{
    width:100%;
    margin-top:4px;
    background:transparent;
    border:1px dashed var(--border);
    color:var(--accent);
    font-family:inherit;
    font-size:12px;
    font-weight:600;
    padding:8px;
    border-radius:7px;
    cursor:pointer;
  }
  .add-link-btn:hover{border-color:var(--accent);background:#0f2a17;}

  .add-form{
    display:none;
    flex-direction:column;
    gap:6px;
    padding:8px 2px 2px;
  }
  .add-form.open{display:flex;}
  .add-form input{
    font-family:inherit;
    font-size:12px;
    background:#0d1117;
    border:1px solid var(--border);
    color:var(--text);
    padding:7px 9px;
    border-radius:6px;
  }
  .add-form button{
    background:var(--accent-dim);
    border:none;
    color:#0d1117;
    font-weight:700;
    padding:7px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
    font-size:12px;
  }

  footer{margin-top:44px;color:var(--text-dim);font-size:12px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">$ dashboard --init</div>
    <h1>Mein Dashboard</h1>
    <p class="sub">Link-Sammlung in 4 Spalten. Kopfzeile anklicken zum Ein-/Ausklappen, "+ Link hinzufügen" für neue Einträge.</p>
  </header>

  <div class="board" id="board"></div>

  <footer>Zum Bearbeiten der Startdaten: Array "columns" im Quellcode (script-Tag) anpassen.</footer>
</div>

<script>
// ===================================================================
// HIER EINFACH BEARBEITEN: Spalten & Links anpassen
// Favicons werden automatisch anhand der URL geladen.
// ===================================================================
let columns = [
  {
    title: "Projekte",
    links: [
      { name: "claude-toolkit", url: "https://github.com/" },
      { name: "portfolio-site", url: "https://github.com/" },
      { name: "data-pipeline",  url: "https://github.com/" },
    ]
  },
  {
    title: "Tools",
    links: [
      { name: "GitHub", url: "https://github.com" },
      { name: "Vercel", url: "https://vercel.com" },
      { name: "Figma",  url: "https://figma.com" },
      { name: "Notion", url: "https://notion.so" },
    ]
  },
  {
    title: "Docs",
    links: [
      { name: "MDN Web Docs", url: "https://developer.mozilla.org" },
      { name: "React Docs",   url: "https://react.dev" },
    ]
  },
  {
    title: "Sonstiges",
    links: [
      { name: "Hacker News", url: "https://news.ycombinator.com" },
      { name: "Twitter/X",   url: "https://x.com" },
      { name: "Reddit",      url: "https://reddit.com" },
    ]
  },
];
// ===================================================================

function favicon(url){
  try{
    const domain = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
  }catch(e){
    return '';
  }
}

function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  columns.forEach((col, ci) => {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="col-head" data-idx="${ci}">
        <h2>${col.title}</h2>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="count">${col.links.length}</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="col-body">
        <div class="tiles"></div>
        <button class="add-link-btn" data-idx="${ci}">+ Link hinzufügen</button>
        <div class="add-form" data-idx="${ci}">
          <input type="text" name="name" placeholder="Name">
          <input type="text" name="url" placeholder="https://...">
          <button class="save-link" data-idx="${ci}">Speichern</button>
        </div>
      </div>
    `;
    const tiles = colEl.querySelector('.tiles');
    col.links.forEach(l => {
      const a = document.createElement('a');
      a.className = 'tile';
      a.href = l.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `<img src="${favicon(l.url)}" alt=""><span>${l.name}</span><span class="arrow">↗</span>`;
      tiles.appendChild(a);
    });
    board.appendChild(colEl);
  });

  board.querySelectorAll('.col-head').forEach(head => {
    head.addEventListener('click', () => {
      head.closest('.column').classList.toggle('collapsed');
    });
  });

  board.querySelectorAll('.add-link-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = btn.dataset.idx;
      board.querySelector(`.add-form[data-idx="${idx}"]`).classList.toggle('open');
    });
  });

  board.querySelectorAll('.save-link').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const form = board.querySelector(`.add-form[data-idx="${idx}"]`);
      const name = form.querySelector('[name="name"]').value.trim();
      let url = form.querySelector('[name="url"]').value.trim();
      if(!name || !url) return;
      if(!/^https?:\/\//.test(url)) url = 'https://' + url;
      columns[idx].links.push({ name, url });
      render();
    });
  });
}

render();
</script>
</body>
</html>
